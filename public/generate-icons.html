<!DOCTYPE html>
<html>
<head><title>Gerar Ícones</title></head>
<body>
<h1>Gerador de Ícones PWA</h1>
<p>Abre este ficheiro no browser para gerar os ícones!</p>
<button onclick="generate()">Gerar Ícones</button>
<div id="output"></div>

<script>
function generate() {
  // Canvas 512x512
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 512;
  const ctx = canvas.getContext('2d');
  
  // Gradient background
  const gradient = ctx.createLinearGradient(0, 0, 512, 512);
  gradient.addColorStop(0, '#3b82f6');
  gradient.addColorStop(1, '#1d4ed8');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 512, 512);
  
  // Euro symbol
  ctx.fillStyle = 'white';
  ctx.font = 'bold 280px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('€', 256, 256);
  
  // Download 512
  const link512 = document.createElement('a');
  link512.download = 'icon-512.png';
  link512.href = canvas.toDataURL();
  link512.click();
  
  // Resize para 192
  const canvas192 = document.createElement('canvas');
  canvas192.width = 192;
  canvas192.height = 192;
  const ctx192 = canvas192.getContext('2d');
  ctx192.drawImage(canvas, 0, 0, 192, 192);
  
  // Download 192
  const link192 = document.createElement('a');
  link192.download = 'icon-192.png';
  link192.href = canvas192.toDataURL();
  link192.click();
  
  document.getElementById('output').innerHTML = '✅ Ícones gerados! Verifica a pasta Downloads.';
}
</script>
</body>
</html>
